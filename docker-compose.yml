version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:80"
    env_file: .env
    volumes:
      - ./comprobantes:/app/comprobantes
      - ./uploads:/app/uploads
      - ./certificados:/app/certificados
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ardavfact
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
